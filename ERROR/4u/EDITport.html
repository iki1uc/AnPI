
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>4u – EDITport</title>

<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;}
pre{background:#111;padding:12px;border:1px solid #333;}
textarea{background:#111;color:#0f0;border:1px solid #333;padding:10px;width:300px;height:120px;}
button{background:#111;color:#0f0;border:1px solid #333;padding:8px 16px;}
</style>
</head>

<body>

<h1>4u – EDITport</h1>

<textarea id="edit">Hier bearbeiten…</textarea>
<button onclick="run()">EDIT</button>

<pre id="out">Bereit...</pre>

<script>
function run(){
  const x = edit.value;
  const data = {
    layer: "4u",
    type: "edit",
    content: x,
    status: "ok"
  };
  out.textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
