  station: "STATION",
  run8,
  vec,
  kanal,
  arg: ARG.ARG("ok"),
  xarg: ARG.xARG("test"),
  xarg4u: ARG.XARG("validate", FOURU),
  matrix: {
    raw: MRAW.default,
    m81: M81.default,
    full: MFULL.default

};
