<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ORT · VERIFY · Tech-Module · NC² · 6D · 12e</title>

<style>
  body { background:#000; color:#00ffff; font-family:Consolas; padding:20px; }
  h1,h2 { color:#33ccff; text-shadow:0 0 10px #00ffff; }
  .block { background:#111; border:1px solid #333; padding:15px; margin:20px 0; border-radius:8px; }
  pre { background:#000; border:1px solid #333; padding:12px; border-radius:6px; }
</style>

<script>
// Datei laden
async function loadFile(name){
  try{
    const r = await fetch("./" + name);
    if(!r.ok) return { name, ok:false, content:"" };
    const txt = await r.text();
    return { name, ok:true, content:txt };
  }catch(e){
    return { name, ok:false, content:"" };
  }
}

// NC² / 6D / 12e Vektor
function vector(content){
  return {
    NC2: content.length,
    D6: content.split("\n").length,
    E12: content.includes("ERR") ? "kritisch" : "neutral"
  };
}

// Arbeits-Tüchtigkeit
function status(r){
  if(!r.ok) return "FEHLT";
  if(r.content.includes("ERR")) return "ORANGE";
  return "GRÜN";
}

// Marktlage aus ADD.room
function markt(score){
  if(score < 50) return "Marktlage: Schwach";
  if(score < 120) return "Marktlage: Neutral";
  if(score < 200) return "Marktlage: Stark";
  return "Marktlage: Sehr stark";
}

// Wertbildung aus 7-Level CSV
function wert(sum){
  if(sum < 50) return "Wertbildung: niedrig";
  if(sum < 150) return "Wertbildung: mittel";
  if(sum < 300) return "Wertbildung: hoch";
  return "Wertbildung: extrem";
}

// CSV summieren
function sumCSV(txt){
  if(!txt) return 0;
  return txt.split("\n")
    .map(v => parseFloat(v.trim()))
    .filter(v => !isNaN(v))
    .reduce((a,b)=>a+b,0);
}

async function start(){

  const FILES = [
    "12e allin allout.room",
    "6D‑Baum.raw",
    "6E → 6D.tech",
    "NC²",
    "NC² (1)",
    "NC²octa².dual",
    "NC²octa²□.merge",
    "NC²□ (1).lock",
    "NC²□ (1).sync",
    "NC²□.lock",
    "NC²□.sync",
    "NC²□octa³.align",
    "Q.room",
    "STATIONEN.raw",
    "T.room",
    "level-pyramiden-7.csv",
    "level-pyramiden-7 (1).csv",
    "level-pyramiden-7 (2).csv",
    "level-pyramiden-7 (3).csv",
    "level-pyramiden-7 (4).csv",
    "level-pyramiden-7 (5).csv",
    "level-pyramiden-7 (6).csv",
    "level-pyramiden-7 (7).csv",
    "ADD.room",
    "Freq.html",
    "ID.html",
    "ORT.html",
    "ORT.respo",
    "README.md",
    "bore.html",
    "core.axm",
    "im.html",
    "index.html",
    "mer.html",
    "wie.html"
  ];

  const out = document.getElementById("verify");

  let sum7 = 0;

  for(const f of FILES){
    const r = await loadFile(f);
    const vec = vector(r.content);

    if(f.includes("level-pyramiden-7")) sum7 += sumCSV(r.content);

    const div = document.createElement("div");
    div.className = "block";
    div.innerHTML = `
      <h2>${f} — ${status(r)}</h2>
      <pre>${r.ok ? r.content.substring(0,300) : "FEHLT"}</pre>
      <pre>
NC²‑Vektor: ${vec.NC2}
6D‑Vektor: ${vec.D6}
12e‑Status: ${vec.E12}
      </pre>
    `;
    out.appendChild(div);
  }

  // ADD.room Score
  const ADD = await loadFile("ADD.room");
  let SCORE = 0;

  if(ADD.ok){
    const m = ADD.content.match(/HOME_SCORE\s*=\s*([0-9\.\-]+)/);
    SCORE = m ? parseFloat(m[1]) : 0;
  }

  // Markt + Wertbildung Panel
  const marketDiv = document.createElement("div");
  marketDiv.className = "block";
  marketDiv.innerHTML = `
    <h2>Marktlage & Wertbildung</h2>
    <pre>
Marktlage: ${markt(SCORE)}
Wertbildung: ${wert(sum7)}
    </pre>
  `;
  out.appendChild(marketDiv);
}
</script>
</head>

<body onload="start()">

<h1>ORT · VERIFY · Tech-Module · NC² · 6D · 12e</h1>

<div id="verify"></div>

</body>
</html>
