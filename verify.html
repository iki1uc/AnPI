<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify · Station</title>
<script type="module">

import { loadUniversal } from "../INDEX/loader.js";
await loadUniversal();

// Zugriff auf alle Systeme
const { RUN8, VECTOR, KANAL, ARG, M81, MRAW, MFULL, FOURU } = window.AnPI;

// Station‑Test
const test = {
  station: location.pathname,
  run8: RUN8.RUN8_bind({ pulse(){return 1}, axis(){return "N"}, sequence(){return "SEQ"} }),
  vector: VECTOR.VECTOR_pipe({ axis:"N" }),
  kanal: KANAL.kanal({ vector:"VECTOR(N)", sat:"SAT", nc:"NC", worm:"WORM" }),
  arg: ARG.ARG("ok"),
  xarg: ARG.xARG("test"),
  xarg4u: ARG.XARG("validate", FOURU),
  matrix: {
    raw: MRAW.default,
    m81: M81.default,
    full: MFULL.default
  }
};

// Ergebnis global setzen
window.NC_ROOM_RESULT = test;

</script>
</head>
<body>
Verify läuft…
</body>
</html>
