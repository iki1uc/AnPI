<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>4u – IMport</title>

<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;}
pre{background:#111;padding:12px;border:1px solid #333;}
input{background:#111;color:#0f0;border:1px solid #333;padding:6px;width:200px;}
button{background:#111;color:#0f0;border:1px solid #333;padding:8px 16px;}
</style>
</head>

<body>

<h1>4u – IMport</h1>

<input id="inp" placeholder="Daten eingeben">
<button onclick="run()">IMPORT</button>

<pre id="out">Bereit...</pre>

<script>
function run(){
  const x = inp.value;
  const data = {
    layer: "4u",
    type: "import",
    input: x,
    status: "ok"
  };
  out.textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
