<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GRГњN В· VERIFY В· ZOOM в†’ ORT в†’ HOME В· AchsenвЂ‘WГјrfel В· 1mвЂ‘Linie</title>

<style>
  body { background:#000; color:#00ff88; font-family:Consolas; padding:20px; }
  h1,h2 { color:#33ffcc; text-shadow:0 0 10px #00ff88; }
  .block { background:#111; border:1px solid #333; padding:15px; margin:20px 0; border-radius:8px; }
  pre { background:#000; border:1px solid #333; padding:12px; border-radius:6px; }
</style>

<script>
// ------------------------------------------------------
// GRГњN VERIFY В· ZOOM в†’ ORT в†’ HOME В· AchsenвЂ‘WГјrfel
// ------------------------------------------------------

// Dateien fГјr ZOOM-Stufe (1m Linie)
const ZOOM_FILES = [
  "zoom.line",
  "zoom.axis",
  "zoom.color"
];

// Dateien fГјr ORT-Stufe (Achsen-WГјrfel)
const ORT_FILES = [
  "ORT.scan",
  "ORT.axis",
  "ORT.cube",
  "ORT.color"
];

// Dateien fГјr HOME-Stufe (Weitsicht)
const HOME_FILES = [
  "HOME.respo",
  "HOME.detail",
  "HOME.matrix"
];

// Tech-Dateien
const TECH = [
  "NCВІ","NCВІ (1)","NCВІв–Ў.sync",
  "NCВІoctaВІ.dual","NCВІoctaВІв–Ў.merge",
  "NCВІв–Ў.lock","NCВІв–ЎoctaВі.align",
  "6D-Baum.raw","12e allin allout.room"
];

// Datei laden
async function loadFile(name){
  try{
    const res = await fetch("./" + name);
    if(!res.ok) return { name, ok:false };
    const txt = await res.text();
    return { name, ok:true, content:txt };
  }catch(e){
    return { name, ok:false };
  }
}

// GEO-Vektor
function geoVector(content){
  return {
    NC2: content.length,
    D6: content.split("\n").length,
    E12: content.includes("ERR") ? "kritisch" : "neutral"
  };
}

// Arbeits-TГјchtigkeit
function arbeitsT(r){
  if(!r.ok) return "FEHLT";
  if(r.content.includes("ERR")) return "ORANGE";
  return "GRГњN";
}

// Start
async function start(){
  const results = [];

  for(const f of [...ZOOM_FILES, ...ORT_FILES, ...HOME_FILES, ...TECH]){
    results.push(await loadFile(f));
  }

  const out = document.getElementById("verify");

  results.forEach(r => {
    const vec = r.ok ? geoVector(r.content) : { NC2:0, D6:0, E12:"FEHLT" };
    const at = arbeitsT(r);

    const div = document.createElement("div");
    div.className = "block";
    div.innerHTML = `
      <h2>${r.name} вЂ” ${at}</h2>
      <pre>${r.ok ? r.content.substring(0,300) : "FEHLT"}</pre>
      <pre>
NCВІвЂ‘Vektor: ${vec.NC2}
6DвЂ‘Vektor: ${vec.D6}
12eвЂ‘Status: ${vec.E12}
      </pre>
    `;
    out.appendChild(div);
  });
}
</script>
</head>

<body onload="start()">

<h1>GRГњN В· VERIFY В· ZOOM в†’ ORT в†’ HOME В· AchsenвЂ‘WГјrfel В· 1mвЂ‘Linie</h1>

<div id="verify"></div>

</body>
</html>
